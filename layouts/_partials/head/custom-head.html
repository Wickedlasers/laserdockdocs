<!-- Typography: mimic docs.thulite.io -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --font-sans: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    /* Type scale inspired by docs.thulite.io */
    --sl-text-xs: 0.8125rem;  /* 13px */
    --sl-text-sm: 0.9375rem;  /* 15px */
    --sl-text-base: 1rem;     /* 16px */
    --sl-text-lg: 1.125rem;   /* 18px */
    --sl-text-h4: 1.25rem;    /* 20px */
  }
  /* Base typography */
  body { font-family: var(--font-sans); font-size: 16px; line-height: 1.65; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  p { margin-top: 0.75rem; margin-bottom: 0.75rem; }
  h1, h2, h3, h4, h5, h6 { font-family: var(--font-sans); font-weight: 700; letter-spacing: -0.01em; }
  h1 { font-size: 2rem; line-height: 1.2; margin-top: 0.5rem; margin-bottom: 1rem; }
  h2 { font-size: 1.5rem; line-height: 1.3; margin-top: 2rem; margin-bottom: 0.75rem; }
  code, pre, kbd, samp { font-family: var(--font-mono); font-size: 0.95em; }

  /* Layout: center main content with balanced sidebars */
  /* Use container-xl from params; fine-tune columns */
  @media (min-width: 1200px) {
    .docs-sidebar { max-width: 300px; }
    .docs-toc { max-width: 280px; }
    .docs-content { max-width: 860px; }
  }
  @media (min-width: 1400px) {
    .docs-content { max-width: 900px; }
  }
  .docs-content { margin-inline: auto; padding-top: 32px; }

  /* Improve readability of lists */
  .docs-content ul, .docs-content ol { padding-left: 1.25rem; margin-top: 0.5rem; margin-bottom: 1rem; }
  .docs-content li { margin: 0.25rem 0; }

  /* Navbar brand: show LaserOS logo left of title */
  .navbar .navbar-brand {
    display: inline-flex;
    align-items: center;
    background-image: url('/images/LaserOSLogo.png');
    background-repeat: no-repeat;
    background-position: left center;
    background-size: 28px 28px;
    padding-left: 36px; /* space for logo */
    min-height: 28px;
  }

  /* Quick Links styles (adapted from docs.thulite.io) */
  /* Ensure consistent padding on all sides: 16px */
  #quick-links-section { margin-top: 0 !important; padding: 1rem !important; }
  #quick-links-section .card-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem 1.5rem;
  }
  #quick-links-section .card-grid > article {
    flex: 1 1 16rem; /* grow, shrink, base width */
    max-width: 100%;
  }
  #quick-links-section .card {
    border: 1px solid var(--sl-color-gray-5, #2b2f31);
    background-color: var(--sl-color-black, #0b0d0e);
    padding: clamp(1rem, calc(.125rem + 3vw), 2.5rem);
    display: flex;
    flex-direction: column;
    gap: clamp(.5rem, calc(.125rem + 1vw), 1rem);
    border-radius: .5rem;
  }
  #quick-links-section .card .title { font-weight: 600; font-size: var(--sl-text-h4); color: var(--sl-color-white, #e6e6e6); line-height: 1.2; gap: 1rem; align-items: center; display: flex; }
  /* Enlarge icons proportionally to title size */
  #quick-links-section .card .title .icon { width: 1.4em; height: 1.4em; flex: 0 0 auto; }
  #quick-links-section .card .icon {
    color: var(--sl-color-gray-3, #a0a7ad);
    border: 1px solid var(--ql-icon-border, #3a3f43);
    background-color: var(--ql-icon-bg, rgba(160,167,173,0.08));
    padding: .25em; /* scales with icon size */
    border-radius: .25rem;
  }
  #quick-links-section .card .body { margin: 0; font-size: clamp(var(--sl-text-sm), calc(.5rem + 1vw), var(--sl-text-base)); }
  #quick-links-section .card .body ul { margin: 0; padding-left: 1.25rem; }
  #quick-links-section .card .body li { margin: .3rem 0; }
  #quick-links-section .card a { text-decoration: none; }
  #quick-links-section .card a:hover { text-decoration: underline; }

  /* Remove vertical margins on each quick link article */
  #quick-links-section > div > div > div > article { margin-top: 0 !important; margin-bottom: 0 !important; }

  /* Per-card icon colors to mimic source */
  #quick-links-section .card:nth-child(1) .icon {
    --ql-icon-border: #f59f0b; /* orange */
    --ql-icon-bg: rgba(245,159,11,0.15);
    color: #f59f0b;
  }
  #quick-links-section .card:nth-child(2) .icon {
    --ql-icon-border: #a855f7; /* purple */
    --ql-icon-bg: rgba(168,85,247,0.15);
    color: #a855f7;
  }
  #quick-links-section .card:nth-child(3) .icon {
    --ql-icon-border: #22c55e; /* green */
    --ql-icon-bg: rgba(34,197,94,0.15);
    color: #22c55e;
  }
  #quick-links-section .card:nth-child(4) .icon {
    --ql-icon-border: #ef4444; /* red */
    --ql-icon-bg: rgba(239,68,68,0.15);
    color: #ef4444;
  }
</style>
<!-- Custom head -->
